name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake python3-distutils
          pip3 install --user --upgrade pip
          pip3 install --user buildozer cython virtualenv

      - name: Build with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-player-apk
          path: bin/*.apk
